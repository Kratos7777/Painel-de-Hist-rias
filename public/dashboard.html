<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Painel de Controle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #121212;
            color: #F3F0DF;
            font-family: 'Segoe UI', sans-serif;
            line-height: 1.6;
        }

        .navbar {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF5252 100%);
            padding: 15px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .navbar h1 { color: white; font-size: 1.5rem; }

        .nav-links { display: flex; gap: 10px; flex-wrap: wrap; }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            transition: 0.3s;
            background: rgba(255,255,255,0.1);
            font-size: 0.9rem;
        }
        .nav-links a:hover { background: rgba(255,255,255,0.2); }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(24,28,37,0.7);
            border: 1px solid rgba(17,202,160,0.2);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
        }
        .stat-card:hover { border-color: #11CAA0; background: rgba(24,28,37,0.9); }

        .stat-number { font-size: 2.5rem; color: #11CAA0; font-weight: bold; margin-bottom: 10px; }
        .stat-label  { color: #A0A0A0; font-size: 0.9rem; }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .section {
            background: rgba(24,28,37,0.7);
            border: 1px solid rgba(17,202,160,0.2);
            border-radius: 8px;
            padding: 30px;
        }
        .section h2 {
            color: #11CAA0;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid rgba(17,202,160,0.3);
            padding-bottom: 10px;
        }

        .form-group { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; color: #A0A0A0; font-weight: bold; }

        input[type="number"], textarea {
            width: 100%;
            padding: 12px;
            background: rgba(15,17,21,0.8);
            border: 1px solid rgba(17,202,160,0.3);
            color: #F3F0DF;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
        }
        input[type="number"]:focus, textarea:focus {
            outline: none;
            border-color: #11CAA0;
            box-shadow: 0 0 10px rgba(17,202,160,0.2);
        }
        textarea { min-height: 300px; resize: vertical; }

        .button-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }
        .btn-primary   { background: #11CAA0; color: #121212; }
        .btn-primary:hover { background: #0a9d7f; }

        .btn-secondary { background: rgba(17,202,160,0.2); color: #11CAA0; border: 1px solid #11CAA0; }
        .btn-secondary:hover { background: rgba(17,202,160,0.3); }

        .btn-danger    { background: rgba(255,107,107,0.2); color: #FF6B6B; border: 1px solid #FF6B6B; }
        .btn-danger:hover { background: rgba(255,107,107,0.3); }

        .message { padding: 15px; border-radius: 6px; margin-bottom: 20px; display: none; }
        .message.success { background: rgba(17,202,160,0.2); color: #11CAA0; border: 1px solid #11CAA0; display: block; }
        .message.error   { background: rgba(255,107,107,0.2); color: #FF6B6B; border: 1px solid #FF6B
