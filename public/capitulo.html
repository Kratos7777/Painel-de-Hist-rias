<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TR: Vida - Capítulo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #121212;
            color: #F3F0DF;
            font-family: 'Georgia', 'Garamond', serif;
            line-height: 1.9;
        }

        .navbar {
            background: linear-gradient(135deg, #11CAA0 0%, #0a9d7f 100%);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            flex-wrap: wrap;
            gap: 15px;
        }

        .navbar h1 {
            color: white;
            font-size: 1.5rem;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .chapter-number {
            text-align: center;
            color: #A0A0A0;
            font-size: 0.95rem;
            margin-bottom: 20px;
            font-style: italic;
        }

        .chapter-title {
            text-align: center;
            margin-bottom: 30px;
            color: #11CAA0;
            font-size: 2rem;
            text-shadow: 0 2px 5px rgba(17, 202, 160, 0.2);
        }

        .chapter-content {
            background: rgba(24, 28, 37, 0.5);
            padding: 30px;
            border-radius: 8px;
            border-left: 3px solid #11CAA0;
            min-height: 400px;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            font-size: 1.05rem;
            line-height: 2;
        }

        .loading {
            text-align: center;
            color: #A0A0A0;
            padding: 40px;
            font-style: italic;
        }

        .error {
            text-align: center;
            color: #FF6B6B;
            padding: 40px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 8px;
            border: 1px solid #FF6B6B;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(17, 202, 160, 0.2);
            flex-wrap: wrap;
            gap: 15px;
        }

        .nav-btn {
            padding: 10px 20px;
            border: 1px solid #11CAA0;
            color: #11CAA0;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
            cursor: pointer;
            background: transparent;
            font-weight: bold;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(17, 202, 160, 0.1);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chapter-info {
            text-align: center;
            color: #A0A0A0;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .chapter-info strong {
            color: #11CAA0;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
            }

            .chapter-content {
                padding: 20px;
                font-size: 1rem;
            }

            .navigation {
                flex-direction: column;
            }

            .nav-btn {
                width: 100%;
            }
        }
    </style>
    <script src="/global.js"></script>
</head>

<body>

    <div class="navbar">
        <h1>TR: Vida</h1>
        <div class="nav-links">
            <a href="/capa">← Voltar</a>
            <a href="/configuracoes">⚙️ Configurações</a>
            <a href="/logout">Sair</a>
        </div>
    </div>

    <div class="container">
        <div class="chapter-number">Capítulo <span id="cap-numero">1</span></div>
        <h2 class="chapter-title" id="chapter-title">Carregando...</h2>

        <div class="chapter-content" id="chapter-content">
            <div class="loading">Carregando capítulo...</div>
        </div>

        <div class="chapter-info">
            <strong id="total-capitulos">0</strong> capítulo(s) postado(s) • Capítulo <strong id="current-cap">1</strong>
        </div>

        <div class="navigation">
            <button class="nav-btn" id="btn-anterior" onclick="irParaCapitulo(-1)">← Anterior</button>
            <button class="nav-btn" id="btn-proximo" onclick="irParaCapitulo(1)">Próximo →</button>
        </div>
    </div>

    <script>
        function obterNumeroCapitulo() {
            const match = window.location.pathname.match(/\/trvida\/(\d+)/);
            return match ? parseInt(match[1]) : 1;
        }

        let numeroAtual = obterNumeroCapitulo();
        let totalCapitulos = 0;

        async function carregarCapitulo(numero) {
            try {
                const response = await fetch(`/api/capitulo/${numero}`);
                const conteudo = await response.text();

                window.history.pushState({}, '', `/trvida/${numero}`);

                numeroAtual = numero;
                document.getElementById("cap-numero").textContent = numero;
                document.getElementById("current-cap").textContent = numero;
                document.getElementById("chapter-title").textContent = `Capítulo ${numero}`;

                const contentDiv = document.getElementById("chapter-content");
                contentDiv.innerHTML = "";
                contentDiv.style.whiteSpace = "pre-wrap";
                contentDiv.textContent = conteudo;

                atualizarBotoesNavegacao();
                window.scrollTo(0, 0);
            } catch (e) {
                document.getElementById("chapter-content").innerHTML = `
                    <div class="error">
                        Erro ao carregar o capítulo. Tente novamente.
                    </div>
                `;
                console.error("Erro:", e);
            }
        }

        function atualizarBotoesNavegacao() {
            const btnAnterior = document.getElementById("btn-anterior");
            const btnProximo = document.getElementById("btn-proximo");

            btnAnterior.disabled = numeroAtual <= 1;
            btnProximo.disabled = numeroAtual >= totalCapitulos;
        }

        function irParaCapitulo(direcao) {
            const novoNumero = numeroAtual + direcao;

            if (novoNumero >= 1 && novoNumero <= totalCapitulos) {
                carregarCapitulo(novoNumero);
            }
        }

        async function carregarDados() {
            try {
                const respCaps = await fetch('/api/capitulos');
                const caps = await respCaps.json();

                totalCapitulos = Array.isArray(caps) ? caps.length : 0;
                document.getElementById("total-capitulos").textContent = totalCapitulos;

                carregarCapitulo(numeroAtual);
            } catch (e) {
                console.error("Erro ao carregar dados:", e);
            }
        }

        carregarDados();
    </script>

</body>
</html>
