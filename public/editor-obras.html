<!DOCTYPE html>
<html lang=\"pt-BR\">
<head>
<meta charset=\"UTF-8\">
<title>Editor de Obras — Portal de Histórias</title>
<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f1115;color:#fff;min-height:100vh;padding:30px 20px}
.wrap{max-width:1100px;margin:0 auto}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:10px}
h1{font-size:26px;color:#11CAA0}
.back{color:#a4b0be;text-decoration:none;font-size:14px}
.back:hover{color:#fff}
.tabs{display:flex;gap:6px;margin-bottom:20px;border-bottom:1px solid #232838;flex-wrap:wrap}
.tab{padding:10px 18px;background:none;border:none;color:#a4b0be;cursor:pointer;font-size:14px;border-bottom:2px solid transparent;font-family:inherit}
.tab.active{color:#11CAA0;border-bottom-color:#11CAA0}
.panel{display:none}
.panel.active{display:block}
.card{background:#181c25;border:1px solid #232838;border-radius:10px;padding:24px;margin-bottom:16px}
label{display:block;font-size:13px;color:#a4b0be;margin-bottom:6px;margin-top:14px;font-weight:600}
label:first-child{margin-top:0}
input,textarea,select{width:100%;background:#0f1115;border:1px solid #232838;color:#fff;padding:10px 12px;border-radius:6px;font-family:inherit;font-size:14px}
input:focus,textarea:focus,select:focus{outline:none;border-color:#11CAA0}
textarea{resize:vertical;min-height:120px;line-height:1.6}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.row{grid-template-columns:1fr}}
.btns{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
button.b{padding:10px 22px;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:14px;font-family:inherit}
.b-pri{background:#11CAA0;color:#0f1115}
.b-pri:hover{background:#0fb38c}
.b-sec{background:#232838;color:#fff}
.b-sec:hover{background:#2d3344}
.b-dan{background:#ff4757;color:#fff}
.b-dan:hover{background:#e63946}
.msg{padding:12px 16px;border-radius:6px;margin-top:14px;display:none;font-size:14px}
.msg.ok{background:#11ca6033;color:#11CA60;border:1px solid #11CA60;display:block}
.msg.err{background:#ff475733;color:#ff4757;border:1px solid #ff4757;display:block}
.lista-obras{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.obra-item{display:flex;justify-content:space-between;align-items:center;background:#0f1115;padding:12px 16px;border-radius:6px;border:1px solid #232838}
.obra-item-info{display:flex;flex-direction:column;gap:3px}
.obra-item-titulo{font-weight:600}
.obra-item-meta{font-size:12px;color:#666}
.obra-item-acts{display:flex;gap:6px}
.mini{padding:6px 12px;border:none;border-radius:5px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}
.cap-list{display:flex;flex-direction:column;gap:6px;margin-top:14px;max-height:300px;overflow-y:auto;padding:8px;background:#0f1115;border-radius:6px;border:1px solid #232838}
.cap-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#181c25;border-radius:5px;font-size:14px;cursor:pointer}
.cap-item:hover{background:#1e2330}
.hint{font-size:12px;color:#666;margin-top:4px}
.section-title{font-size:16px;color:#11CAA0;margin:24px 0 12px;font-weight:600}
</style>
</head>
<body>
<div class=\"wrap\">
  <div class=\"top\">
    <h1>✏️ Editor de Obras</h1>
    <a class=\"back\" href=\"/funcionalidades\">← Voltar</a>
  </div>

  <div class=\"tabs\">
    <button class=\"tab active\" data-tab=\"obras\" onclick=\"trocarTab('obras')\">📚 Outras Obras</button>
    <button class=\"tab\" data-tab=\"trvida\" onclick=\"trocarTab('trvida')\">🌌 TR: Vida (metadados)</button>
  </div>

  <!-- =================== ABA OUTRAS OBRAS =================== -->
  <div id=\"panel-obras\" class=\"panel active\">
    <div class=\"card\">
      <div class=\"section-title\">Obras existentes</div>
      <div id=\"lista\" class=\"lista-obras\"><em style=\"color:#666\">Carregando...</em></div>
      <button class=\"b b-sec\" onclick=\"novaObra()\">+ Nova obra</button>
    </div>

    <div id=\"form-obra\" class=\"card\" style=\"display:none\">
      <div class=\"section-title\" id=\"form-titulo\">Nova Obra</div>
      <input type=\"hidden\" id=\"slug-original\">
      <div class=\"row\">
        <div><label>Título *</label><input id=\"titulo\" placeholder=\"Ex: A Casa na Floresta\"></div>
        <div><label>Slug (URL)</label><input id=\"slug\" placeholder=\"auto a partir do título\"><div class=\"hint\">Deixe em branco pra gerar automaticamente</div></div>
      </div>
      <label>Descrição curta</label>
      <textarea id=\"descricao\" placeholder=\"Resumo de 2-3 linhas que aparece no card\"></textarea>
      <div class=\"row\">
        <div><label>Gêneros (separados por vírgula)</label><input id=\"generos\" placeholder=\"Romance, Suspense, Drama\"></div>
        <div><label>Imagem de capa (URL)</label><input id=\"capaUrl\" placeholder=\"https://...\"></div>
      </div>
      <div class=\"row\">
        <div><label>Data de criação original</label><input type=\"date\" id=\"dataCriacaoOriginal\"></div>
        <div><label>Status</label>
          <select id=\"status\">
            <option value=\"em-andamento\">Em andamento</option>
            <option value=\"concluida\">Concluída</option>
            <option value=\"pausada\">Pausada</option>
            <option value=\"oneshot\">One-shot</option>
          </select>
        </div>
      </div>
      <label>Tipo *</label>
      <select id=\"tipo\" onchange=\"atualizarTipo()\">
        <option value=\"unico\">Único (conto numa página só)</option>
        <option value=\"serie\">Série (com vários capítulos)</option>
      </select>

      <div id=\"bloco-unico\">
        <label>Conteúdo do conto</label>
        <textarea id=\"conteudoUnico\" style=\"min-height:260px\" placeholder=\"Cole aqui o texto completo da obra...\"></textarea>
      </div>

      <div id=\"bloco-serie\" style=\"display:none\">
        <div class=\"section-title\" style=\"margin-top:24px\">Capítulos desta série</div>
        <div id=\"cap-lista\" class=\"cap-list\"></div>
        <button class=\"b b-sec\" style=\"margin-top:10px\" onclick=\"novoCap()\">+ Adicionar capítulo</button>
      </div>

      <div class=\"btns\">
        <button class=\"b b-pri\" onclick=\"salvarObra()\">💾 Salvar obra</button>
        <button class=\"b b-sec\" onclick=\"cancelarObra()\">Cancelar</button>
        <button class=\"b b-dan\" id=\"btn-excluir\" onclick=\"excluirObra()\" style=\"margin-left:auto;display:none\">🗑 Excluir obra</button>
      </div>
      <div id=\"msg-obra\" class=\"msg\"></div>
    </div>

    <!-- Editor de capítulo dentro do form -->
    <div id=\"form-cap\" class=\"card\" style=\"display:none\">
      <div class=\"section-title\" id=\"form-cap-titulo\">Editar Capítulo</div>
      <div class=\"row\">
        <div><label>Número *</label><input type=\"number\" id=\"cap-numero\" min=\"1\"></div>
        <div><label>Título do capítulo</label><input id=\"cap-titulo\" placeholder=\"Opcional\"></div>
      </div>
      <label>Conteúdo *</label>
      <textarea id=\"cap-conteudo\" style=\"min-height:280px\"></textarea>
      <div class=\"btns\">
        <button class=\"b b-pri\" onclick=\"salvarCap()\">💾 Salvar capítulo</button>
        <button class=\"b b-sec\" onclick=\"document.getElementById('form-cap').style.display='none'\">Cancelar</button>
        <button class=\"b b-dan\" id=\"btn-cap-excluir\" onclick=\"excluirCap()\" style=\"margin-left:auto;display:none\">🗑 Excluir capítulo</button>
      </div>
      <div id=\"msg-cap\" class=\"msg\"></div>
    </div>
  </div>

  <!-- =================== ABA TR: VIDA =================== -->
  <div id=\"panel-trvida\" class=\"panel\">
    <div class=\"card\">
      <div class=\"section-title\">Metadados da obra principal (TR: Vida)</div>
      <p style=\"color:#a4b0be;font-size:14px;margin-bottom:10px\">Esses dados aparecem na página <a href=\"/catalogo\" style=\"color:#11CAA0\">/catalogo</a>. Os capítulos continuam sendo editados em <a href=\"/editor\" style=\"color:#11CAA0\">/editor</a>.</p>
      <label>Título</label>
      <input id=\"tr-titulo\" placeholder=\"TR: Vida\">
      <label>Descrição</label>
      <textarea id=\"tr-descricao\"></textarea>
      <div class=\"row\">
        <div><label>Gêneros (separados por vírgula)</label><input id=\"tr-generos\"></div>
        <div><label>Capa (URL)</label><input id=\"tr-capaUrl\"></div>
      </div>
      <div class=\"row\">
        <div><label>Data de criação original</label><input type=\"date\" id=\"tr-dataCriacaoOriginal\"></div>
        <div><label>Status</label>
          <select id=\"tr-status\">
            <option value=\"em-andamento\">Em andamento</option>
            <option value=\"concluida\">Concluída</option>
            <option value=\"pausada\">Pausada</option>
          </select>
        </div>
      </div>
      <div class=\"btns\">
        <button class=\"b b-pri\" onclick=\"salvarTrVida()\">💾 Salvar metadados</button>
      </div>
      <div id=\"msg-tr\" class=\"msg\"></div>
    </div>
  </div>
</div>

<script>
let editandoSlug=null,obrasCache=[],editandoCapObraSlug=null,editandoCapNumero=null;

function trocarTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+t));
  if(t==='trvida')carregarTrVida();
}

function showMsg(id,txt,tipo){
  const el=document.getElementById(id);
  el.className='msg '+tipo;
  el.textContent=txt;
  setTimeout(()=>{el.className='msg'},4000);
}

// ========== LISTAGEM ==========
async function carregarObras(){
  const r=await fetch('/api/obras');
  obrasCache=await r.json();
  const div=document.getElementById('lista');
  if(!obrasCache.length){div.innerHTML='<em style=\"color:#666\">Nenhuma obra criada ainda.</em>';return}
  div.innerHTML=obrasCache.map(o=>`
    <div class=\"obra-item\">
      <div class=\"obra-item-info\">
        <span class=\"obra-item-titulo\">${o.titulo}</span>
        <span class=\"obra-item-meta\">${o.tipo==='unico'?'Conto único':'Série'} · ${o.status} · /${o.slug}</span>
      </div>
      <div class=\"obra-item-acts\">
        <button class=\"mini b-pri\" onclick=\"editarObra('${o.slug}')\">Editar</button>
      </div>
    </div>`).join('');
}

function novaObra(){
  editandoSlug=null;
  document.getElementById('form-titulo').textContent='Nova Obra';
  document.getElementById('btn-excluir').style.display='none';
  ['titulo','slug','descricao','generos','capaUrl','dataCriacaoOriginal','conteudoUnico'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('status').value='em-andamento';
  document.getElementById('tipo').value='unico';
  document.getElementById('slug-original').value='';
  atualizarTipo();
  document.getElementById('form-obra').style.display='block';
  document.getElementById('form-cap').style.display='none';
  window.scrollTo({top:document.getElementById('form-obra').offsetTop-20,behavior:'smooth'});
}

async function editarObra(slug){
  const r=await fetch('/api/obra/'+slug);
  const o=await r.json();
  editandoSlug=slug;
  document.getElementById('form-titulo').textContent='Editar: '+o.titulo;
  document.getElementById('btn-excluir').style.display='inline-block';
  document.getElementById('titulo').value=o.titulo||'';
  document.getElementById('slug').value=o.slug||'';
  document.getElementById('slug-original').value=o.slug||'';
  document.getElementById('descricao').value=o.descricao||'';
  document.getElementById('generos').value=(o.generos||[]).join(', ');
  document.getElementById('capaUrl').value=o.capaUrl||'';
  document.getElementById('dataCriacaoOriginal').value=o.dataCriacaoOriginal?o.dataCriacaoOriginal.substring(0,10):'';
  document.getElementById('status').value=o.status||'em-andamento';
  document.getElementById('tipo').value=o.tipo||'unico';
  document.getElementById('conteudoUnico').value=o.conteudoUnico||'';
  atualizarTipo();
  if(o.tipo==='serie')renderCaps(o.capitulos||[]);
  document.getElementById('form-obra').style.display='block';
  document.getElementById('form-cap').style.display='none';
  window.scrollTo({top:document.getElementById('form-obra').offsetTop-20,behavior:'smooth'});
}

function atualizarTipo(){
  const t=document.getElementById('tipo').value;
  document.getElementById('bloco-unico').style.display=t==='unico'?'block':'none';
  document.getElementById('bloco-serie').style.display=t==='serie'?'block':'none';
}

function renderCaps(caps){
  const div=document.getElementById('cap-lista');
  if(!caps.length){div.innerHTML='<em style=\"color:#666;padding:8px\">Nenhum capítulo ainda.</em>';return}
  div.innerHTML=caps.map(c=>`
    <div class=\"cap-item\" onclick=\"editarCap('${editandoSlug}',${c.numero})\">
      <span>Cap. ${c.numero}${c.titulo?' — '+c.titulo:''}</span>
      <span style=\"color:#666;font-size:12px\">${c.palavras||0} palavras</span>
    </div>`).join('');
}

async function salvarObra(){
  const tipo=document.getElementById('tipo').value;
  const dados={
    slug:document.getElementById('slug-original').value||document.getElementById('slug').value||document.getElementById('titulo').value,
    titulo:document.getElementById('titulo').value.trim(),
    descricao:document.getElementById('descricao').value.trim(),
    generos:document.getElementById('generos').value,
    capaUrl:document.getElementById('capaUrl').value.trim(),
    dataCriacaoOriginal:document.getElementById('dataCriacaoOriginal').value||null,
    status:document.getElementById('status').value,
    tipo,
    conteudoUnico:tipo==='unico'?document.getElementById('conteudoUnico').value:''
  };
  if(!dados.titulo)return showMsg('msg-obra','Título é obrigatório.','err');
  // Se está editando E mudou o slug → usa o novo
  if(editandoSlug&&document.getElementById('slug').value&&document.getElementById('slug').value!==editandoSlug){
    dados.slug=document.getElementById('slug').value;
  }
  const r=await fetch('/api/salvar-obra',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(dados)});
  const j=await r.json();
  if(!r.ok)return showMsg('msg-obra',j.error||'Erro','err');
  showMsg('msg-obra','Obra salva com sucesso!','ok');
  editandoSlug=j.obra.slug;
  document.getElementById('slug-original').value=j.obra.slug;
  document.getElementById('btn-excluir').style.display='inline-block';
  carregarObras();
  if(tipo==='serie'){
    const r2=await fetch('/api/obra/'+j.obra.slug);
    const o=await r2.json();
    renderCaps(o.capitulos||[]);
  }
}

async function excluirObra(){
  if(!editandoSlug||!confirm('Excluir essa obra E todos os capítulos dela? Isso não pode ser desfeito.'))return;
  const r=await fetch('/api/obra/'+editandoSlug,{method:'DELETE'});
  const j=await r.json();
  if(!r.ok)return showMsg('msg-obra',j.error||'Erro','err');
  document.getElementById('form-obra').style.display='none';
  editandoSlug=null;
  carregarObras();
}

function cancelarObra(){document.getElementById('form-obra').style.display='none';editandoSlug=null}

// ========== CAPÍTULOS ==========
function novoCap(){
  if(!editandoSlug)return alert('Salve a obra primeiro antes de adicionar capítulos.');
  editandoCapObraSlug=editandoSlug;
  editandoCapNumero=null;
  document.getElementById('form-cap-titulo').textContent='Novo Capítulo';
  document.getElementById('btn-cap-excluir').style.display='none';
  document.getElementById('cap-numero').value='';
  document.getElementById('cap-titulo').value='';
  document.getElementById('cap-conteudo').value='';
  document.getElementById('form-cap').style.display='block';
  window.scrollTo({top:document.getElementById('form-cap').offsetTop-20,behavior:'smooth'});
}

async function editarCap(slug,num){
  const r=await fetch(`/api/obra/${slug}/cap/${num}`);
  const c=await r.json();
  editandoCapObraSlug=slug;
  editandoCapNumero=num;
  document.getElementById('form-cap-titulo').textContent=`Editar Capítulo ${num}`;
  document.getElementById('btn-cap-excluir').style.display='inline-block';
  document.getElementById('cap-numero').value=num;
  document.getElementById('cap-titulo').value=c.titulo||'';
  document.getElementById('cap-conteudo').value=c.conteudo||'';
  document.getElementById('form-cap').style.display='block';
  window.scrollTo({top:document.getElementById('form-cap').offsetTop-20,behavior:'smooth'});
}

async function salvarCap(){
  const dados={
    obraSlug:editandoCapObraSlug,
    numero:parseInt(document.getElementById('cap-numero').value,10),
    titulo:document.getElementById('cap-titulo').value.trim(),
    conteudo:document.getElementById('cap-conteudo').value
  };
  if(!dados.numero||!dados.conteudo)return showMsg('msg-cap','Número e conteúdo obrigatórios.','err');
  const r=await fetch('/api/salvar-cap-obra',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(dados)});
  const j=await r.json();
  if(!r.ok)return showMsg('msg-cap',j.error||'Erro','err');
  showMsg('msg-cap','Capítulo salvo!','ok');
  editandoCapNumero=dados.numero;
  document.getElementById('btn-cap-excluir').style.display='inline-block';
  // Atualiza a lista de capítulos da obra aberta
  const r2=await fetch('/api/obra/'+editandoCapObraSlug);
  const o=await r2.json();
  renderCaps(o.capitulos||[]);
}

async function excluirCap(){
  if(!editandoCapObraSlug||!editandoCapNumero||!confirm('Excluir esse capítulo?'))return;
  const r=await fetch(`/api/obra/${editandoCapObraSlug}/cap/${editandoCapNumero}`,{method:'DELETE'});
  const j=await r.json();
  if(!r.ok)return showMsg('msg-cap',j.error||'Erro','err');
  document.getElementById('form-cap').style.display='none';
  const r2=await fetch('/api/obra/'+editandoCapObraSlug);
  const o=await r2.json();
  renderCaps(o.capitulos||[]);
}

// ========== TR: VIDA ==========
async function carregarTrVida(){
  const r=await fetch('/api/tr-vida-info');
  const d=await r.json();
  const o=d.obra||{};
  document.getElementById('tr-titulo').value=o.titulo||'TR: Vida';
  document.getElementById('tr-descricao').value=o.descricao||'';
  document.getElementById('tr-generos').value=(o.generos||[]).join(', ');
  document.getElementById('tr-capaUrl').value=o.capaUrl||'';
  document.getElementById('tr-dataCriacaoOriginal').value=o.dataCriacaoOriginal?o.dataCriacaoOriginal.substring(0,10):'';
  document.getElementById('tr-status').value=o.status||'em-andamento';
}

async function salvarTrVida(){
  const dados={
    titulo:document.getElementById('tr-titulo').value.trim(),
    descricao:document.getElementById('tr-descricao').value.trim(),
    generos:document.getElementById('tr-generos').value,
    capaUrl:document.getElementById('tr-capaUrl').value.trim(),
    dataCriacaoOriginal:document.getElementById('tr-dataCriacaoOriginal').value||null,
    status:document.getElementById('tr-status').value
  };
  const r=await fetch('/api/salvar-tr-vida-info',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(dados)});
  const j=await r.json();
  if(!r.ok)return showMsg('msg-tr',j.error||'Erro','err');
  showMsg('msg-tr','Metadados salvos!','ok');
}

carregarObras();
</script>
</body>
</html>
