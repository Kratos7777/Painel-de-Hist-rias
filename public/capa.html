<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca | TR: Vida</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #11CAA0;
            --bg: #090b0e;
            --surface: #12151c;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(at 0% 0%, rgba(17, 202, 160, 0.1) 0, transparent 50%);
        }

        nav {
            padding: 1.5rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem; font-weight: 900;
            color: var(--primary);
            text-decoration: none;
        }

        header {
            padding: 100px 5% 40px;
            text-align: center;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--surface);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
        }

        .card-img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }

        .card-info {
            padding: 20px;
            text-align: center;
        }

        .card-info h2 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 10px;
        }

        .card-btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--primary);
            color: var(--bg);
            border-radius: 50px;
            font-weight: 800;
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* VISÃO DE CAPÍTULOS */
        #chapter-view {
            display: none;
            padding: 40px 5%;
            max-width: 1000px;
            margin: 0 auto;
        }

        .back-btn {
            background: none; border: 1px solid var(--primary); color: var(--primary);
            padding: 8px 16px; border-radius: 50px; cursor: pointer;
            margin-bottom: 30px; font-weight: 600;
        }

        .chapter-item {
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .chapter-item:hover {
            background: rgba(17, 202, 160, 0.1);
            transform: translateX(10px);
        }

        footer {
            padding: 60px 5% 30px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>

    <nav>
        <a href="/" class="logo">TR: VIDA</a>
        <div style="display: flex; gap: 20px;">
            <a href="/editor" style="color: white; text-decoration: none;">Editor</a>
            <a href="/logout" style="color: var(--danger); text-decoration: none;">Sair</a>
        </div>
    </nav>

    <header id="main-header">
        <h1>Sua <span>Biblioteca</span></h1>
        <p>Escolha uma obra para começar sua jornada.</p>
    </header>

    <!-- VISÃO DE OBRAS -->
    <main class="grid" id="works-grid">
        <div class="card" onclick="showChapters()">
            <img src="/imagens/capa-principal.png" alt="TR: Vida" class="card-img" onerror="this.src='https://via.placeholder.com/400x600?text=TR:+Vida'">
            <div class="card-info">
                <h2>TR: Vida</h2>
                <p style="color: var(--text-dim); margin-bottom: 15px;">A obra primordial do ecossistema.</p>
                <span class="card-btn">VER CAPÍTULOS</span>
            </div>
        </div>
    </main>

    <!-- VISÃO DE CAPÍTULOS -->
    <section id="chapter-view">
        <button class="back-btn" onclick="showWorks()"><i class="fas fa-arrow-left"></i> Voltar para Obras</button>
        <h2 id="work-title" style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 30px;">TR: Vida - Capítulos</h2>
        <div id="chapters-list">
            <!-- Capítulos carregados via JS -->
            <p>Carregando capítulos...</p>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 TR: Vida - O Ecossistema da Literatura Imersiva.</p>
    </footer>

    <script>
        let allStories = [];

        // Busca os capítulos do servidor
        async function fetchStories() {
            try {
                const response = await fetch('/api/stories/list');
                const data = await response.json();
                if (data.success) {
                    allStories = data.stories;
                }
            } catch (err) {
                console.error("Erro ao carregar capítulos:", err);
            }
        }

        function showChapters() {
            document.getElementById('works-grid').style.display = 'none';
            document.getElementById('main-header').style.display = 'none';
            document.getElementById('chapter-view').style.display = 'block';
            
            const list = document.getElementById('chapters-list');
            list.innerHTML = '';

            if (allStories.length === 0) {
                list.innerHTML = '<p>Nenhum capítulo encontrado para esta obra.</p>';
                return;
            }

            allStories.forEach(story => {
                const div = document.createElement('div');
                div.className = 'chapter-item';
                div.onclick = () => window.location.href = story.url;
                div.innerHTML = `
                    <span style="font-weight: 600; font-size: 1.1rem;">${story.title}</span>
                    <i class="fas fa-chevron-right" style="color: var(--primary);"></i>
                `;
                list.appendChild(div);
            });
        }

        function showWorks() {
            document.getElementById('works-grid').style.display = 'grid';
            document.getElementById('main-header').style.display = 'block';
            document.getElementById('chapter-view').style.display = 'none';
        }

        // Inicia a busca assim que a página carrega
        fetchStories();
    </script>
</body>
</html>
