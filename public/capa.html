<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TR: Vida - Capa do Livro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0f1115 0%, #1a1f2e 50%, #121212 100%);
            color: #F3F0DF;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(circle at 20% 50%, rgba(17,202,160,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(17,202,160,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .navbar {
            position: fixed;
            top: 0; width: 100%;
            background: linear-gradient(135deg, #11CAA0 0%, #0a9d7f 100%);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 100;
            flex-wrap: wrap;
            gap: 15px;
        }

        .navbar h1 { color: white; font-size: 1.3rem; }

        .nav-links { display: flex; gap: 10px; flex-wrap: wrap; }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            transition: 0.3s;
            background: rgba(255,255,255,0.1);
            font-size: 0.9rem;
        }
        .nav-links a:hover { background: rgba(255,255,255,0.2); }

        .capa-container {
            text-align: center;
            max-width: 700px;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
            animation: fadeInDown 0.8s ease-out;
            margin-top: 80px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            color: #11CAA0;
            text-shadow: 0 4px 15px rgba(17,202,160,0.3), 0 0 20px rgba(17,202,160,0.1);
            letter-spacing: 2px;
            font-weight: 700;
        }

        .subtitulo {
            font-size: 1.3rem;
            color: #A0A0A0;
            margin-bottom: 40px;
            font-style: italic;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .capa-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .foto-capa {
            width: 320px; height: 480px;
            object-fit: cover;
            border-radius: 12px;
            border: 3px solid rgba(17,202,160,0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(17,202,160,0.2);
            background: linear-gradient(135deg, #1A1E2E 0%, #0f1115 100%);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            display: block;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .foto-capa:hover {
            transform: scale(1.05) translateY(-10px);
            border-color: #11CAA0;
            box-shadow: 0 30px 60px rgba(17,202,160,0.3), 0 0 40px rgba(17,202,160,0.3);
        }

        .dica-clique {
            margin-top: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: #11CAA0;
            animation: piscar 2s infinite;
        }

        @keyframes piscar {
            0%  { opacity: .5; }
            50% { opacity: 1;  }
            100%{ opacity: .5; }
        }

        .botoes-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .btn {
            padding: 14px 28px;
            border: 2px solid #11CAA0;
            color: #11CAA0;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 1rem;
            background: transparent;
            cursor: pointer;
            display: inline-block;
        }
        .btn:hover {
            background: rgba(17,202,160,0.15);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(17,202,160,0.2);
        }

        .btn-editor { border-color: #FF6B6B; color: #FF6B6B; display: none; }
        .btn-editor:hover { background: rgba(255,107,107,0.15); box-shadow: 0 5px 15px rgba(255,107,107,0.2); }

        .info-capitulos {
            margin-top: 30px;
            font-size: 1rem;
            color: #F3F0DF;
            padding: 20px;
            background: linear-gradient(135deg, rgba(17,202,160,0.15) 0%, rgba(17,202,160,0.05) 100%);
            border-left: 4px solid #11CAA0;
            border-radius: 8px;
            animation: fadeInUp 0.8s ease-out 0.5s both;
        }
        .info-capitulos strong { color: #11CAA0; font-size: 1.2rem; }

        .admin-section {
            display: none;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(17,202,160,0.2);
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }
        .admin-section.visible { display: block; }

        .admin-badge {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, #FF6B6B, #FF5252);
            color: white;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(255,107,107,0.3);
        }

        @media (max-width: 600px) {
            .navbar { flex-direction: column; }
            h1 { font-size: 2.5rem; }
            .subtitulo { font-size: 1.1rem; }
            .foto-capa { width: 280px; height: 420px; }
            .botoes-container { flex-direction: column; }
            .btn { width: 100%; }
            .capa-container { margin-top: 100px; }
        }
    </style>
    <script src="/global.js"></script>
</head>
<body>

    <div class="navbar">
        <h1>TR: Vida</h1>
        <div class="nav-links">
            <a href="/perfil">👤 Perfil</a>
            <a href="/configuracoes">⚙️ Configurações</a>
            <a href="/logout">Sair</a>
        </div>
    </div>

    <div class="capa-container">
        <h1>TR: Vida</h1>
        <p class="subtitulo">Volume 1 — O Começo de Tudo</p>

        <div class="capa-wrapper">
            <a id="link-inicio" href="/trvida/1">
                <img
                    src="/imagens/capa.png"
                    class="foto-capa"
                    alt="Capa do livro TR: Vida"
                    loading="lazy"
                    onerror="this.style.border='2px dashed #11CAA0';">
            </a>
        </div>

        <p class="dica-clique">CLIQUE NA CAPA PARA COMEÇAR ➜</p>

        <div class="botoes-container">
            <a class="btn" id="continuar-btn" href="/trvida/1">📖 Continuar leitura</a>
            <a class="btn btn-editor" id="btn-editor" href="/dashboard">✏️ Painel do Editor</a>
        </div>

        <div class="info-capitulos">
            <strong id="total-capitulos">0</strong> capítulo(s) postado(s)
        </div>

        <div class="admin-section" id="admin-section">
            <span class="admin-badge">👑 Você é administrador</span>
        </div>
    </div>

    <script>
        async function carregarDados() {
            try {
                const respCaps = await fetch('/api/capitulos');
                const caps = await respCaps.json();

                if (Array.isArray(caps) && caps.length > 0) {
                    // CORRIGIDO: usar ultimo.numero (era 'ultimo' direto, que é um objeto)
                    const ultimo = caps[caps.length - 1];
                    document.getElementById('continuar-btn').href = `/trvida/${ultimo.numero}`;
                }

                document.getElementById('total-capitulos').textContent =
                    Array.isArray(caps) ? caps.length : 0;

                // CORRIGIDO: /api/me não existe — usar /api/user + isAdmin
                const respMe = await fetch('/api/user');
                const me = await respMe.json();

                if (me.isAdmin) {
                    document.getElementById('btn-editor').style.display = 'inline-block';
                    document.getElementById('admin-section').classList.add('visible');
                }
            } catch (e) {
                console.error('Erro ao carregar dados:', e);
            }
        }

        carregarDados();
    </script>

</body>
</html>
