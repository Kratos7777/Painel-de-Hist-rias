<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Carregando Obra... | Portal de Histórias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f1115; color: #e5e7eb; }
        .glass { background: rgba(24, 28, 37, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .capa-shadow { box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .btn-primary { background: #11CAA0; color: #0f1115; transition: all 0.3s ease; }
        .btn-primary:hover { background: #0ea885; transform: translateY(-2px); }
        .shimmer { background: linear-gradient(90deg, #181c25 25%, #242b38 50%, #181c25 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Header / Nav -->
    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <a href="/" class="text-2xl font-bold text-[#11CAA0] flex items-center gap-2">
            <i class="fas fa-book-open"></i> Portal
        </a>
        <div class="flex gap-4">
            <a href="/funcionalidades" class="text-sm text-gray-400 hover:text-white transition">Painel</a>
            <a href="/logout" class="text-sm text-red-400 hover:text-red-300 transition">Sair</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 mt-10">
        <!-- Hero Section: Detalhes da Obra -->
        <div id="loading-skeleton" class="flex flex-col md:flex-row gap-10 animate-pulse">
            <div class="w-full md:w-80 h-[450px] shimmer rounded-xl"></div>
            <div class="flex-1 space-y-4">
                <div class="h-10 w-3/4 shimmer rounded"></div>
                <div class="h-6 w-1/4 shimmer rounded"></div>
                <div class="h-32 w-full shimmer rounded"></div>
            </div>
        </div>

        <div id="obra-content" class="hidden flex flex-col md:flex-row gap-10">
            <!-- Capa -->
            <div class="w-full md:w-80 flex-shrink-0">
                <img id="obra-capa" src="" alt="Capa" class="w-full h-auto rounded-xl capa-shadow border border-gray-800">
            </div>

            <!-- Info -->
            <div class="flex-1">
                <div class="flex flex-wrap items-center gap-3 mb-4" id="obra-generos">
                    <!-- Gêneros via JS -->
                </div>
                <h1 id="obra-titulo" class="text-4xl md:text-5xl font-bold mb-4 text-white"></h1>
                <p id="obra-status" class="inline-block px-3 py-1 rounded-full text-xs font-semibold bg-gray-800 text-gray-300 mb-6"></p>
                
                <div class="glass p-6 rounded-2xl mb-8">
                    <h2 class="text-lg font-semibold mb-3 text-[#11CAA0]">Sinopse</h2>
                    <p id="obra-descricao" class="text-gray-400 leading-relaxed"></p>
                </div>

                <div class="flex gap-4">
                    <button id="btn-ler-agora" class="btn-primary px-8 py-3 rounded-xl font-bold flex items-center gap-2">
                        <i class="fas fa-play"></i> Começar Leitura
                    </button>
                    <button class="bg-gray-800 hover:bg-gray-700 px-6 py-3 rounded-xl font-bold transition">
                        <i class="far fa-bookmark"></i> Salvar
                    </button>
                </div>
            </div>
        </div>

        <!-- Lista de Capítulos -->
        <section class="mt-20">
            <div class="flex justify-between items-end mb-8 border-b border-gray-800 pb-4">
                <h3 class="text-2xl font-bold text-white">Capítulos</h3>
                <span id="total-caps" class="text-gray-500">0 capítulos</span>
            </div>

            <div id="lista-capitulos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Capítulos via JS -->
            </div>
        </section>
    </main>

    <script>
        // Lógica Inteligente de Carregamento
        async function carregarObra() {
            // Pega o slug da URL (ex: /obra/tempus-requiem)
            const pathParts = window.location.pathname.split('/');
            const slug = pathParts[pathParts.length - 1];

            try {
                const response = await fetch(`/api/obra/${slug}`);
                if (!response.ok) throw new Error('Obra não encontrada');
                
                const obra = await response.json();

                // Preenche os dados básicos
                document.getElementById('page-title').innerText = `${obra.titulo} | Portal`;
                document.getElementById('obra-titulo').innerText = obra.titulo;
                document.getElementById('obra-capa').src = obra.capaUrl || '/imagens/default-capa.jpg';
                document.getElementById('obra-descricao').innerText = obra.descricao || 'Sem sinopse disponível.';
                document.getElementById('obra-status').innerText = obra.status.toUpperCase();
                document.getElementById('total-caps').innerText = `${obra.capitulos.length} capítulos`;

                // Gêneros
                const generosContainer = document.getElementById('obra-generos');
                obra.generos.forEach(gen => {
                    const span = document.createElement('span');
                    span.className = 'px-3 py-1 bg-[#11CAA015] text-[#11CAA0] border border-[#11CAA030] rounded-lg text-xs font-medium';
                    span.innerText = gen;
                    generosContainer.appendChild(span);
                });

                // Capítulos
                const listaContainer = document.getElementById('lista-capitulos');
                if (obra.capitulos.length === 0) {
                    listaContainer.innerHTML = '<p class="text-gray-500 col-span-full">Nenhum capítulo postado ainda.</p>';
                } else {
                    obra.capitulos.forEach(cap => {
                        const card = document.createElement('a');
                        // Ajuste de rota conforme o tipo da obra
                        const rotaLeitura = obra.ehObraPrincipal ? `/trvida/${cap.numero}` : `/obra/${obra.slug}/cap/${cap.numero}`;
                        
                        card.href = rotaLeitura;
                        card.className = 'glass p-4 rounded-xl flex items-center justify-between hover:border-[#11CAA0] transition group';
                        card.innerHTML = `
                            <div>
                                <span class="text-xs text-gray-500 block mb-1">Capítulo ${cap.numero}</span>
                                <span class="font-semibold text-gray-200 group-hover:text-[#11CAA0] transition">${cap.titulo || 'Sem título'}</span>
                            </div>
                            <i class="fas fa-chevron-right text-gray-600 group-hover:text-[#11CAA0]"></i>
                        `;
                        listaContainer.appendChild(card);
                    });

                    // Botão Ler Agora (leva ao primeiro capítulo)
                    document.getElementById('btn-ler-agora').onclick = () => {
                        const primeiroCap = obra.capitulos[0].numero;
                        window.location.href = obra.ehObraPrincipal ? `/trvida/${primeiroCap}` : `/obra/${obra.slug}/cap/${primeiroCap}`;
                    };
                }

                // Mostrar conteúdo e esconder skeleton
                document.getElementById('loading-skeleton').classList.add('hidden');
                document.getElementById('obra-content').classList.remove('hidden');

            } catch (err) {
                console.error(err);
                document.body.innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center text-center p-6">
                        <h1 class="text-6xl font-bold text-red-500 mb-4">404</h1>
                        <p class="text-xl text-gray-400 mb-8">Ops! Não conseguimos encontrar essa obra.</p>
                        <a href="/" class="btn-primary px-8 py-3 rounded-xl font-bold">Voltar ao Início</a>
                    </div>
                `;
            }
        }

        window.onload = carregarObra;
    </script>
</body>
</html>
